name: antigravity
description: "Voice-powered brainstorming app that breaks convention."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.0

  # Functional Programming (Either, Option)
  fpdart: ^1.1.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Voice
  speech_to_text: ^6.6.0
  just_audio: ^0.9.36

  # Utils
  uuid: ^4.3.0
  connectivity_plus: ^5.0.0
  share_plus: ^7.2.0
  package_info_plus: ^6.0.0
  intl: ^0.19.0

  # Voice & TTS
  flutter_tts: ^3.8.5

  # Security
  flutter_secure_storage: ^9.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  # Assets removed — API keys must NOT be bundled in the binary.
  # Use a secure backend proxy or CI build-time injection.
